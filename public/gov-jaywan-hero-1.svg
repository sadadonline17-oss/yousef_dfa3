  </text>
  <text x="600" y="320" font-family="Cairo, sans-serif" font-size="22" fill="white" opacity="0.85">
    ✓ مقبولة في 200 دولة
  </text>
  <text x="600" y="360" font-family="Cairo, sans-serif" font-size="22" fill="white" opacity="0.85">
    ✓ شراكة مع Visa وMastercard
  </text>
  <text x="600" y="400" font-family="Cairo, sans-serif" font-size="22" fill="white" opacity="0.85">
    ✓ دعم المدفوعات الرقمية
  </text>
