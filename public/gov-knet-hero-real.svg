<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 514">
  <defs>
    <linearGradient id="knet_real_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066CC"/>
      <stop offset="50%" style="stop-color:#004999"/>
      <stop offset="100%" style="stop-color:#003D82"/>
    </linearGradient>
    <linearGradient id="knet_gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFCC00"/>
      <stop offset="100%" style="stop-color:#FFB700"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="514" fill="url(#knet_real_bg)"/>
  
  <!-- Decorative Pattern -->
  <g opacity="0.08">
    <rect x="800" y="50" width="300" height="400" fill="url(#knet_gold)" transform="rotate(25 950 250)"/>
    <rect x="900" y="100" width="200" height="300" fill="white" transform="rotate(-15 1000 250)"/>
  </g>
  
  <!-- KNET Logo Style -->
  <g transform="translate(120, 140)">
    <rect x="0" y="0" width="380" height="220" rx="20" fill="white" opacity="0.95"/>
    <rect x="15" y="15" width="350" height="190" rx="15" fill="url(#knet_real_bg)"/>
    
    <!-- Large K Letter -->
    <text x="60" y="150" font-family="Arial Black, sans-serif" font-size="120" font-weight="900" fill="url(#knet_gold)">
      K
    </text>
    
    <!-- KNET Text -->
    <text x="180" y="110" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white">
      K net
    </text>
    <text x="180" y="145" font-family="Cairo, sans-serif" font-size="24" fill="white" opacity="0.9">
      كي نت
    </text>
    
    <!-- Card Chip -->
    <rect x="250" y="45" width="50" height="40" rx="5" fill="#FFD700" opacity="0.9"/>
    
    <!-- Contactless Icon -->
    <g transform="translate(320, 45)">
      <path d="M0,15 Q5,0 10,15" fill="none" stroke="white" stroke-width="2" opacity="0.6"/>
      <path d="M5,15 Q10,5 15,15" fill="none" stroke="white" stroke-width="2" opacity="0.6"/>
      <path d="M10,15 Q15,10 20,15" fill="none" stroke="white" stroke-width="2" opacity="0.6"/>
    </g>
  </g>
  
  <!-- Text Content -->
  <text x="600" y="150" font-family="Cairo, sans-serif" font-size="60" font-weight="bold" fill="white">
    كي نت - KNET
  </text>
  <text x="600" y="210" font-family="Cairo, sans-serif" font-size="28" fill="white" opacity="0.95">
    شبكة الكويت الوطنية للمدفوعات
  </text>
  <text x="600" y="270" font-family="Cairo, sans-serif" font-size="22" fill="#FFCC00" opacity="0.95">
    ✓ أكثر من 25,000 نقطة بيع
  </text>
  <text x="600" y="310" font-family="Cairo, sans-serif" font-size="22" fill="#FFCC00" opacity="0.95">
    ✓ 13 بنك كويتي مشارك
  </text>
  <text x="600" y="350" font-family="Cairo, sans-serif" font-size="22" fill="#FFCC00" opacity="0.95">
    ✓ K-Pay للمدفوعات الرقمية
  </text>
  <text x="600" y="390" font-family="Cairo, sans-serif" font-size="22" fill="#FFCC00" opacity="0.95">
    ✓ معتمد من بنك الكويت المركزي
  </text>
</svg>
