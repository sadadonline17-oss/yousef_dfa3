<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 514">
  <defs>
    <linearGradient id="benefit_gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#CE1126"/>
      <stop offset="100%" style="stop-color:#D32027"/>
    </linearGradient>
    <pattern id="stripes" width="20" height="20" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="20" stroke="white" stroke-width="15" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="514" fill="url(#benefit_gradient)"/>
  <rect width="1200" height="514" fill="url(#stripes)"/>
  
  <!-- Mobile Phone Icon -->
  <g transform="translate(180, 100)">
    <rect x="0" y="0" width="280" height="300" rx="25" fill="white" opacity="0.95"/>
    <rect x="20" y="30" width="240" height="220" rx="15" fill="#CE1126"/>
    <circle cx="140" cy="275" r="15" fill="#CE1126" opacity="0.3"/>
    
    <!-- App Interface -->
    <text x="140" y="120" font-family="Cairo, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle">
      بنفت
    </text>
    <text x="140" y="150" font-family="Arial, sans-serif" font-size="18" fill="white" text-anchor="middle" opacity="0.9">
      BENEFIT
    </text>
    
    <!-- Payment Icons -->
    <circle cx="80" cy="190" r="20" fill="white" opacity="0.3"/>
    <circle cx="140" cy="190" r="20" fill="white" opacity="0.3"/>
    <circle cx="200" cy="190" r="20" fill="white" opacity="0.3"/>
  </g>
  
  <!-- Text Content -->
  <text x="570" y="160" font-family="Cairo, sans-serif" font-size="56" font-weight="bold" fill="white">
    بنفت - BENEFIT
  </text>
  <text x="570" y="220" font-family="Cairo, sans-serif" font-size="28" fill="white" opacity="0.95">
    الشبكة الإلكترونية للمعاملات المالية
  </text>
  <text x="570" y="280" font-family="Cairo, sans-serif" font-size="22" fill="white" opacity="0.85">
    ✓ BenefitPay - الدفع السريع
  </text>
  <text x="570" y="320" font-family="Cairo, sans-serif" font-size="22" fill="white" opacity="0.85">
    ✓ Fawri - التحويل الفوري
  </text>
  <text x="570" y="360" font-family="Cairo, sans-serif" font-size="22" fill="white" opacity="0.85">
    ✓ Fawateer - دفع الفواتير
  </text>
  <text x="570" y="400" font-family="Cairo, sans-serif" font-size="22" fill="white" opacity="0.85">
    ✓ آمن ومعتمد في البحرين
  </text>
</svg>
