<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 514">
  <defs>
    <linearGradient id="maal_gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D0032C"/>
      <stop offset="50%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#009A44"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="514" fill="url(#maal_gradient)"/>
  
  <!-- Maal Card -->
  <g transform="translate(140, 120)">
    <rect x="0" y="0" width="370" height="240" rx="20" fill="white" opacity="0.95"/>
    <rect x="15" y="15" width="340" height="210" rx="15" fill="linear-gradient(135deg, #D0032C 0%, #009A44 100%)"/>
    
    <!-- Card Design -->
    <circle cx="300" cy="150" r="35" fill="white" opacity="0.2"/>
    <circle cx="270" cy="150" r="35" fill="white" opacity="0.2"/>
    
    <text x="40" y="140" font-family="Cairo, sans-serif" font-size="48" font-weight="bold" fill="white">
      مال
    </text>
    <text x="40" y="185" font-family="Arial, sans-serif" font-size="32" fill="white" opacity="0.9">
      Maal
    </text>
    
    <!-- Chip -->
    <rect x="40" y="60" width="55" height="45" rx="6" fill="#FFD700" opacity="0.95"/>
  </g>
  
  <!-- Text Content -->
  <text x="600" y="160" font-family="Cairo, sans-serif" font-size="56" font-weight="bold" fill="#D0032C">
    مال - Maal
  </text>
  <text x="600" y="220" font-family="Cairo, sans-serif" font-size="28" fill="#1A1A1A" opacity="0.9">
    البطاقة الوطنية العمانية
  </text>
  <text x="600" y="280" font-family="Cairo, sans-serif" font-size="22" fill="#1A1A1A" opacity="0.85">
    ✓ نظام الدفع الوطني العماني
  </text>
  <text x="600" y="320" font-family="Cairo, sans-serif" font-size="22" fill="#1A1A1A" opacity="0.85">
    ✓ بطاقة دفع آمنة ومعتمدة
  </text>
  <text x="600" y="360" font-family="Cairo, sans-serif" font-size="22" fill="#1A1A1A" opacity="0.85">
    ✓ جميع البنوك العمانية
  </text>
  <text x="600" y="400" font-family="Cairo, sans-serif" font-size="22" fill="#1A1A1A" opacity="0.85">
    ✓ معتمد من البنك المركزي العماني
  </text>
</svg>
