<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 514">
  <defs>
    <linearGradient id="knet_gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007A3D"/>
      <stop offset="50%" style="stop-color:#CE1126"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="514" fill="url(#knet_gradient)"/>
  
  <!-- KNET Card Design -->
  <g transform="translate(120, 120)">
    <rect x="0" y="0" width="380" height="240" rx="18" fill="white" opacity="0.95"/>
    <rect x="20" y="20" width="340" height="200" rx="12" fill="linear-gradient(135deg, #007A3D 0%, #CE1126 50%, #000000 100%)"/>
    
    <!-- Card Chip -->
    <rect x="40" y="80" width="50" height="40" rx="5" fill="#FFD700" opacity="0.9"/>
    <line x1="45" y1="90" x2="85" y2="90" stroke="#996600" stroke-width="1"/>
    <line x1="45" y1="100" x2="85" y2="100" stroke="#996600" stroke-width="1"/>
    <line x1="45" y1="110" x2="85" y2="110" stroke="#996600" stroke-width="1"/>
    
    <!-- KNET Logo Text -->
    <text x="40" y="160" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white">
      KNET
    </text>
    <text x="40" y="190" font-family="Cairo, sans-serif" font-size="18" fill="white" opacity="0.9">
      كي نت
    </text>
  </g>
  
  <!-- Text Content -->
  <text x="600" y="160" font-family="Cairo, sans-serif" font-size="56" font-weight="bold" fill="white">
    كي نت - KNET
  </text>
  <text x="600" y="220" font-family="Cairo, sans-serif" font-size="28" fill="white" opacity="0.95">
    شبكة الكويت الوطنية للمدفوعات
  </text>
  <text x="600" y="280" font-family="Cairo, sans-serif" font-size="22" fill="white" opacity="0.85">
    ✓ الدفع الإلكتروني الآمن
  </text>
  <text x="600" y="320" font-family="Cairo, sans-serif" font-size="22" fill="white" opacity="0.85">
    ✓ جميع البنوك الكويتية
  </text>
  <text x="600" y="360" font-family="Cairo, sans-serif" font-size="22" fill="white" opacity="0.85">
    ✓ دفع الفواتير والخدمات
  </text>
  <text x="600" y="400" font-family="Cairo, sans-serif" font-size="22" fill="white" opacity="0.85">
    ✓ K-Pay للمدفوعات الرقمية
  </text>
</svg>
